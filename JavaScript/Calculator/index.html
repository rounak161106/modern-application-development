<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Calculator</title>
</head>
<body>
    <div class="container text-center">
        <div class="row p-3">
            <div class="col"></div>
            <div class="col-6">
                <h3 id="title">Simple Calculator</h3>
            </div>
            <div class="col"></div>
        </div>
        <div class="row">
            <div class="col"></div>
            <div class="col-6">
                <div class="mb-3" >
                    <input type="text" class="form-control" id="exp" placeholder="Enter expression here..">
                </div>
            </div>
            <div class="col"></div>
        </div>
    
        <div class="row">
            <div class="col"></div>
            <div class="col-6">
                <button onclick="calculate()" type="button" class="btn btn-success">Calculate</button>
            </div>
            <div class="col"></div>
        </div>
    </div>  
    <script src="script.js"></script>
</body>
</html>
