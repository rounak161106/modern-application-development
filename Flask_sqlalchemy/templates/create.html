<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .canva{
            width: 60%;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="canva">
        <h1>Add new article</h1>
        <form action="/add" method="POST">

        <div class="mb-3 row">
            <label for="author" class="col-sm-2 col-form-label">Author's ID</label><br>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="author" name="author">
            </div>
        </div>
        <div class="mb-3 row">
            <label for="title" class="col-sm-2 col-form-label">Article Title</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="title" name="title">
            </div>
        </div>

        <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label">Enter the content:</label>
            <textarea class="form-control" id="exampleFormControlTextarea1" rows="10dd" name="content"></textarea>
        </div>

        <input type="submit" name="" id="" value="Add Article">
    </form>
    </div>
</body>
</html>
