<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Update Student</title>
</head>
<body>
    <form action="/student/{{ student.student_id }}/update" method="POST" id="update-student-form">
        <div>
            <label>Roll Number:</label>
            <input type="text" name="roll" value="{{ student.roll_number }}" disabled />
        </div>
        <div>
            <label>First Name:</label>
            <input type="text" name="f_name" value="{{ student.first_name }}" required />
        </div>
        <div>
            <label>Last Name:</label>
            <input type="text" name="l_name" value="{{ student.last_name }}"/>
        </div>
        <div>
            <label for="courses">Select Course: </label>
            <select name="course" id="course">
            <option value="course_1_id">course_1_name</option>
            <option value="course_2_id">course_2_name</option>
            ........
            ........
            <option value="course_n_id">course_n_name</option>
            </select>
        </div>
        <div>
            <input type="submit" value = "Update">
        </div>
    </form>
</body>
</html>
