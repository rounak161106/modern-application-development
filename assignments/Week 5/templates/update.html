<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>
</head>
<body>
    <form action="/student/{{student_id}}/update" method="POST" id="update-form">
        <div>
            <label>Roll Number:</label>
            <input type="text" name="roll" value="{{this_student.roll_number}}" disabled />
        </div><br>
        <div>
            <label>First Name:</label>
            <input type="text" name="f_name" value="{{this_student.first_name}}" required />
        </div><br>
        <div>
            <label>Last Name:</label>
            <input type="text" name="l_name" value="{{this_student.last_name}}"/>
        </div><br>
        <div>
            <label>Select Courses: </label>
            <input type="checkbox" name="courses" value="course_1" {% if 1 in enrolls %}checked {% endif %}/>
            <label>MAD I</label>
            <input type="checkbox" name="courses" value="course_2" {% if 2 in enrolls %}checked {% endif %}/>
            <label>DBMS</label>
            <input type="checkbox" name="courses" value="course_3" {% if 3 in enrolls %}checked {% endif %}/>
            <label>PDSA</label>
            <input type="checkbox" name="courses" value="course_4" {% if 4 in enrolls %}checked {% endif %}/>
            <label>BDM</label>
        </div><br>
        <div>
            <input type="submit" value = "Submit">
        </div>
    </form>
</body>
</html>
