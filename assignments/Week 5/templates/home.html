<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    <h1>Students list</h1>
    {% if students %}
    <table id = "all-students" border="1" cellpadding="8">
        <tr>
            <th>SNo</th>
            <th>Roll Number</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Actions</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{loop.index}}</td>
            <td><a href="/student/{{student.student_id}}">{{student.roll_number}}</a></td>
            <td>{{student.first_name}}</td>
            <td>{{student.last_name}}</td>
            <td>
                <a href="/student/{{student.student_id}}" type="button">Update</a>
                <a href="/student/{{student.student_id}}" type="button">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No student found. Add the students now!</p>
    {% endif %}
    <a href="/student/create">+ Add student</a>
</body>
</html>
